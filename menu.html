<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>БАН. — Карта пића</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111111;
      --surface: #1c1c1c;
      --green: #7ab89a;
      --green-dark: #4a7a62;
      --red: #b03030;
      --white: #f0f0f0;
      --muted: #aaaaaa;
      --border: #2e2e2e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
      font-size: 19px;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      background: #000;
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.8);
      border-bottom: 1px solid #222;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Logo image — place logo.png (or .svg) in same folder as menu.html */
    .logo-img {
      height: 44px;
      width: auto;
      display: block;
    }
    /* Fallback text shown if logo file is missing */
    .logo-fallback {
      font-size: 1.8rem;
      font-weight: 900;
      font-style: italic;
      color: #fff;
      letter-spacing: 2px;
      font-family: Georgia, serif;
      line-height: 1;
    }
    .logo-fallback span { color: var(--red); }

    .lang-toggle {
      display: flex;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .lang-btn {
      padding: 6px 14px;
      font-size: 1.6rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 1px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.5);
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: var(--red);
      color: #fff;
      border-radius: 20px;
    }

    /* ─── NAV TABS ─── */
    .nav-wrap {
      background: #000;
      border-bottom: 1px solid #222;
      overflow-x: auto;
      scrollbar-width: none;
      position: sticky;
      top: 73px;
      z-index: 99;
    }
    .nav-wrap::-webkit-scrollbar { display: none; }
    .nav-tabs {
      display: flex;
      padding: 0 8px;
      gap: 4px;
      width: max-content;
      min-width: 100%;
    }
    .nav-tab {
      padding: 12px 18px;
      font-size: 1.56rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.8px;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: transparent;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .nav-tab.active {
      color: var(--green);
      border-bottom-color: var(--green);
    }

    /* ─── SECTIONS ─── */
    .sections {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px 12px 60px;
    }
    .section { display: none; }
    .section.active { display: block; }

    /* ─── CATEGORY ─── */
    .category { margin-bottom: 28px; }
    .category-title {
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--green);
      text-align: center;
      padding: 14px 0 10px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ─── SUBCATEGORY ─── */
    .subcategory-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--green);
      text-align: center;
      padding: 12px 0 6px;
      margin: 8px 0 4px;
    }

    /* ─── COCKTAIL CARDS ─── */
    .cocktail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 480px) {
      .cocktail-grid { grid-template-columns: 1fr; }
    }

    .cocktail-card {
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Image area — shown only when image column is filled */
    .cocktail-img-wrap {
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: #1a1a1a;
    }
    .cocktail-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cocktail-body {
      padding: 12px 14px 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .cocktail-name {
      font-size: 2rem;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 5px;
    }
    .cocktail-desc {
      font-size: 2rem;
      color: var(--muted);
      line-height: 1.45;
      flex: 1;
      margin-bottom: 10px;
    }
    .cocktail-price {
      display: inline-block;
      background: var(--red);
      color: #fff;
      font-size: 1.7rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      align-self: flex-start;
    }

    /* ─── LIST ITEMS ─── */
    .item-list { display: flex; flex-direction: column; gap: 2px; }
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 10px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .item-row:hover { background: var(--surface); }
    .item-name {
      font-size: 1.8rem;
      color: var(--white);
      flex: 1;
      padding-right: 8px;
    }
    .item-note {
      font-size: 1.8rem;
      color: var(--muted);
      display: block;
      margin-top: 1px;
    }
    .item-price {
      font-size: 1.76rem;
      font-weight: 700;
      color: var(--green);
      white-space: nowrap;
    }
    .item-price.no-price {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.8rem;
    }
    .divider {
      flex: 1;
      height: 1px;
      border-bottom: 1px dotted var(--border);
      margin: 0 8px;
      align-self: center;
    }

    /* ─── LOADING / ERROR ─── */
    .state-msg {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
      font-size: 0.95rem;
    }
    .state-msg.error { color: #e06060; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.72rem;
      padding: 20px 16px;
      border-top: 1px solid var(--border);
      background: #000;
    }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div id="logoWrap">
      <!--
        Put your logo file named "logo.png" (or .svg, .jpg) in the same folder.
        The image below will show it; if the file is missing it falls back to text.
      -->
      <img class="logo-img" src="logo.png" alt="БАН."
           onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';" />
      <div class="logo-fallback" id="logoFallback" style="display:none;">
        <span>БАН</span>.
      </div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('sr')">SR</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<div class="nav-wrap">
  <div class="nav-tabs" id="navTabs"></div>
</div>

<div class="sections" id="sections">
  <div class="state-msg" id="loadingMsg">Učitavanje menija...</div>
</div>

<footer>
  <p id="footerNote">БАН. · Све цене су у динарима</p>
</footer>

<script>
  /* ─────────────────────────────────────────────
     Minimal CSV parser — handles quoted fields
  ───────────────────────────────────────────── */
  function parseCSV(text) {
    const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
    const headers = splitLine(lines[0]);
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      if (!lines[i].trim()) continue;
      const vals = splitLine(lines[i]);
      const obj = {};
      headers.forEach((h, idx) => { obj[h.trim()] = (vals[idx] || '').trim(); });
      rows.push(obj);
    }
    return rows;
  }

  function splitLine(line) {
    const res = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) {
        res.push(cur); cur = '';
      } else cur += c;
    }
    res.push(cur);
    return res;
  }

  /* ─────────────────────────────────────────────
     State
  ───────────────────────────────────────────── */
  let lang = 'sr';

  /* ─────────────────────────────────────────────
     Build DOM
  ───────────────────────────────────────────── */
  function buildMenu(rows) {
    // Ordered sections
    const sectionOrder = [];
    const sectionMeta = {};
    rows.forEach(r => {
      if (!sectionMeta[r.section]) {
        sectionOrder.push(r.section);
        sectionMeta[r.section] = { sr: r.section_sr, en: r.section_en };
      }
    });

    // Nav tabs
    const navTabs = document.getElementById('navTabs');
    navTabs.innerHTML = '';
    sectionOrder.forEach((secId, idx) => {
      const btn = document.createElement('button');
      btn.className = 'nav-tab' + (idx === 0 ? ' active' : '');
      btn.dataset.section = secId;
      btn.dataset.sr = sectionMeta[secId].sr;
      btn.dataset.en = sectionMeta[secId].en;
      btn.textContent = sectionMeta[secId][lang];
      btn.onclick = () => showSection(secId);
      navTabs.appendChild(btn);
    });

    // Sections
    const sectionsEl = document.getElementById('sections');
    sectionsEl.innerHTML = '';

    sectionOrder.forEach((secId, idx) => {
      const secEl = document.createElement('section');
      secEl.className = 'section' + (idx === 0 ? ' active' : '');
      secEl.id = 'sec_' + secId;

      const secRows = rows.filter(r => r.section === secId);

      // Group by category (preserve order)
      const catOrder = [];
      const catMap = {};
      secRows.forEach(r => {
        if (!catMap[r.category_sr]) {
          catOrder.push(r.category_sr);
          catMap[r.category_sr] = { sr: r.category_sr, en: r.category_en, items: [], display: r.display };
        }
        catMap[r.category_sr].items.push(r);
      });

      catOrder.forEach(catKey => {
        const cat = catMap[catKey];
        const catEl = document.createElement('div');
        catEl.className = 'category';

        const catTitle = document.createElement('div');
        catTitle.className = 'category-title';
        catTitle.dataset.sr = cat.sr;
        catTitle.dataset.en = cat.en;
        catTitle.textContent = lang === 'sr' ? cat.sr : cat.en;
        catEl.appendChild(catTitle);

        if (cat.display === 'card') {
          renderCards(cat.items, catEl);
        } else {
          renderList(cat.items, catEl);
        }

        secEl.appendChild(catEl);
      });

      sectionsEl.appendChild(secEl);
    });

    updateFooter();
  }

  /* ─── Cocktail cards ─── */
  function renderCards(items, parent) {
    const grid = document.createElement('div');
    grid.className = 'cocktail-grid';

    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'cocktail-card';

      // Image — only if `image` column is filled
      if (item.image && item.image.trim()) {
        const imgWrap = document.createElement('div');
        imgWrap.className = 'cocktail-img-wrap';
        const img = document.createElement('img');
        img.src = 'images/' + item.image.trim();
        img.alt = item.name_sr;
        // Hide broken image gracefully
        img.onerror = function() { this.closest('.cocktail-img-wrap').style.display = 'none'; };
        imgWrap.appendChild(img);
        card.appendChild(imgWrap);
      }

      const body = document.createElement('div');
      body.className = 'cocktail-body';

      const nameSr = item.name_sr || '';
      const nameEn = item.name_en || '';
      const descSr = item.note_sr || '';
      const descEn = item.note_en || '';

      body.innerHTML = `
        <div class="cocktail-name" data-sr="${esc(nameSr)}" data-en="${esc(nameEn)}">${esc(lang === 'sr' ? nameSr : nameEn)}</div>
        <div class="cocktail-desc" data-sr="${esc(descSr)}" data-en="${esc(descEn)}">${esc(lang === 'sr' ? descSr : descEn)}</div>
        <span class="cocktail-price">${fmtPrice(item.price)}</span>
      `;
      card.appendChild(body);
      grid.appendChild(card);
    });

    parent.appendChild(grid);
  }

  /* ─── List items with subcategories ─── */
  function renderList(items, parent) {
    const subOrder = [];
    const subMap = {};
    items.forEach(item => {
      const key = item.subcategory_sr || '';
      if (!subMap[key]) {
        subOrder.push(key);
        subMap[key] = { sr: item.subcategory_sr, en: item.subcategory_en, items: [] };
      }
      subMap[key].items.push(item);
    });

    subOrder.forEach(subKey => {
      const sub = subMap[subKey];

      if (subKey) {
        const subTitle = document.createElement('div');
        subTitle.className = 'subcategory-title';
        subTitle.dataset.sr = sub.sr;
        subTitle.dataset.en = sub.en;
        subTitle.textContent = lang === 'sr' ? sub.sr : sub.en;
        parent.appendChild(subTitle);
      }

      const list = document.createElement('div');
      list.className = 'item-list';

      sub.items.forEach(item => {
        const noteSr = item.note_sr || '';
        const noteEn = item.note_en || '';
        const nameSr = item.name_sr || '';
        const nameEn = item.name_en || '';
        const hasPrice = item.price && item.price.trim() !== '';

        // Prices are language-neutral — store the same formatted value in both
        // attributes so setLang() never overwrites the price with an empty string.
        const priceFormatted = hasPrice ? fmtPrice(item.price) : '';
        const priceSr = hasPrice ? priceFormatted : 'ускоро';
        const priceEn = hasPrice ? priceFormatted : 'soon';

        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
          <div class="item-name">
            <span data-sr="${esc(nameSr)}" data-en="${esc(nameEn)}">${esc(lang === 'sr' ? nameSr : nameEn)}</span>
            ${noteSr ? `<span class="item-note" data-sr="${esc(noteSr)}" data-en="${esc(noteEn)}">${esc(lang === 'sr' ? noteSr : noteEn)}</span>` : ''}
          </div>
          <div class="divider"></div>
          <div class="item-price ${hasPrice ? '' : 'no-price'}" data-sr="${priceSr}" data-en="${priceEn}">${lang === 'sr' ? priceSr : priceEn}</div>
        `;
        list.appendChild(row);
      });

      parent.appendChild(list);
    });
  }

  /* ─────────────────────────────────────────────
     Helpers
  ───────────────────────────────────────────── */
  function fmtPrice(p) {
    const n = parseInt(p, 10);
    if (isNaN(n)) return '';
    return n.toLocaleString('sr-RS') + ' рсд';
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ─────────────────────────────────────────────
     Language switch
  ───────────────────────────────────────────── */
  function setLang(l) {
    lang = l;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
    document.querySelectorAll('[data-sr][data-en]').forEach(el => {
      const val = el.dataset[l];
      if (val !== undefined) el.textContent = val;
    });
    document.documentElement.lang = l === 'sr' ? 'sr' : 'en';
    updateFooter();
  }

  function updateFooter() {
    document.getElementById('footerNote').textContent =
      lang === 'sr'
        ? 'БАН. · Све цене су у динарима'
        : 'БАН. · All prices are in Serbian dinars (RSD)';
  }

  /* ─────────────────────────────────────────────
     Tab switching
  ───────────────────────────────────────────── */
  function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    const sec = document.getElementById('sec_' + id);
    if (sec) sec.classList.add('active');
    const tab = document.querySelector(`.nav-tab[data-section="${id}"]`);
    if (tab) tab.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ─────────────────────────────────────────────
     Load CSV
  ───────────────────────────────────────────── */
  fetch('menu.csv')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(text => buildMenu(parseCSV(text)))
    .catch(err => {
      const msg = document.getElementById('loadingMsg');
      if (msg) {
        msg.className = 'state-msg error';
        msg.textContent = 'Greška pri učitavanju menija. Pokrenite sa servera, ne direktno kao fajl. (' + err.message + ')';
      }
    });
</script>
</body>
</html>
